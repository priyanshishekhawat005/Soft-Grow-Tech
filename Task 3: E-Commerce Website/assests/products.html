<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoplio | Products</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <span class="brand-mark">S</span>
        <span>Shoplio</span>
      </a>
      <nav class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="products.html">Products</a>
        <a class="nav-link" href="contact.html">Contact</a>
        <a class="cart-pill" href="cart.html">Cart (<span data-cart-count>0</span>)</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <div class="section-head">
      <div>
        <h1>Shop Products</h1>
        <p>Filter and sort to find what fits your style.</p>
      </div>
    </div>

    <section class="filters">
      <label>
        Search
        <input class="input" data-search type="search" placeholder="Search by name or description">
      </label>
      <label>
        Category
        <select class="select" data-category>
          <option value="all">All categories</option>
        </select>
      </label>
      <label>
        Sort by
        <select class="select" data-sort>
          <option value="featured">Featured</option>
          <option value="priceAsc">Price: low to high</option>
          <option value="priceDesc">Price: high to low</option>
          <option value="ratingDesc">Top rated</option>
        </select>
      </label>
    </section>

    <section class="card-grid" data-products-grid></section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <small>© 2026 Shoplio. All rights reserved.</small>
      <small>Secure checkout simulation for demo purposes.</small>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/products.js"></script>
</body>
</html>
