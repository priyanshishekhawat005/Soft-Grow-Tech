<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoplio | Cart</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <span class="brand-mark">S</span>
        <span>Shoplio</span>
      </a>
      <nav class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="products.html">Products</a>
        <a class="nav-link" href="contact.html">Contact</a>
        <a class="cart-pill" href="cart.html">Cart (<span data-cart-count>0</span>)</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <div class="section-head">
      <div>
        <h1>Your Shopping Cart</h1>
        <p>Adjust quantities and review your order summary.</p>
      </div>
    </div>

    <section class="cart-layout">
      <div class="cart-items" data-cart-items></div>
      <aside class="summary">
        <h3>Order summary</h3>
        <div class="summary-row"><span>Subtotal</span><strong data-subtotal>$0.00</strong></div>
        <div class="summary-row"><span>Shipping</span><strong data-shipping>$0.00</strong></div>
        <hr>
        <div class="summary-row"><span>Total</span><strong data-total>$0.00</strong></div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 0.8rem;">Proceed to checkout</button>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <small>© 2026 Shoplio. All rights reserved.</small>
      <small>Checkout button is a demo placeholder.</small>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/cart.js"></script>
</body>
</html>
